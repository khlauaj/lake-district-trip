<html lang="zh-HK">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lake District 行山行程 · 4 個方案</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css" />
<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,600;9..144,900&family=Noto+Sans+HK:wght@400;500;700&display=swap');
  :root { --ink:#20302a; --moss:#2f4f3e; --moss-2:#3d6b52; --sage:#5a8f6b; --mist:#eef3ef; --paper:#f7f9f6; --line:#dde7e0; --amber:#b5732a; --amber-bg:#fdf3e3; --sub:#7d8c83; }
  * { margin:0; padding:0; box-sizing:border-box; }
  html { scroll-behavior:smooth; }
  body { font-family:'Noto Sans HK',sans-serif; color:var(--ink); background:var(--paper); line-height:1.6; -webkit-font-smoothing:antialiased; }
  .wrap { max-width:920px; margin:0 auto; padding:0 20px; }

  .hero { background: radial-gradient(circle at 80% 20%, rgba(255,255,255,0.12) 0%, transparent 45%), linear-gradient(135deg,#25402f 0%,#2f4f3e 45%,#4d7d5e 100%); color:#fff; padding:54px 0 46px; position:relative; overflow:hidden; }
  .hero::before { content:""; position:absolute; inset:0; background-image:url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M0 50 L15 30 L25 40 L40 15 L60 45 L60 60 L0 60 Z' fill='%23ffffff' opacity='0.04'/%3E%3C/svg%3E"); opacity:0.6; }
  .hero .wrap { position:relative; z-index:2; }
  .lang-switch { position:absolute; top:0; right:20px; display:flex; gap:0; background:rgba(255,255,255,0.12); border:1px solid rgba(255,255,255,0.3); border-radius:30px; padding:3px; z-index:5; }
  .lang-btn { background:transparent; border:none; color:#fff; font-family:'Noto Sans HK',sans-serif; font-size:13px; font-weight:700; padding:6px 16px; border-radius:24px; cursor:pointer; transition:all .18s; }
  .lang-btn.active { background:#fff; color:var(--moss); }
  .eyebrow { font-size:13px; letter-spacing:4px; text-transform:uppercase; opacity:0.78; font-weight:700; }
  .hero h1 { font-family:'Fraunces',serif; font-weight:900; font-size:clamp(30px,5.5vw,48px); line-height:1.05; margin:12px 0 8px; }
  .hero .lead { font-size:clamp(14px,2.5vw,17px); opacity:0.92; font-weight:500; }

  .group-label { font-size:11px; letter-spacing:2px; text-transform:uppercase; font-weight:700; opacity:0.7; margin:22px 0 9px; }
  .plan-switch { display:flex; gap:10px; flex-wrap:wrap; }
  .plan-card { flex:1; min-width:200px; background:rgba(255,255,255,0.08); border:2px solid rgba(255,255,255,0.18); border-radius:14px; padding:14px 16px; cursor:pointer; transition:all .22s; text-align:left; font-family:'Noto Sans HK',sans-serif; color:#fff; }
  .plan-card:hover { border-color:rgba(255,255,255,0.45); }
  .plan-card.active { background:#fff; border-color:#fff; color:var(--moss); }
  .plan-card .pc-tag { font-size:10.5px; letter-spacing:1.5px; font-weight:700; opacity:.8; text-transform:uppercase; }
  .plan-card.active .pc-tag { color:var(--sage); opacity:1; }
  .plan-card .pc-name { font-family:'Fraunces',serif; font-size:19px; font-weight:900; margin:3px 0 4px; }
  .plan-card .pc-desc { font-size:12px; opacity:.88; line-height:1.4; }
  .plan-card.active .pc-desc { opacity:1; color:var(--sub); }

  .route-strip { display:flex; gap:0; margin-top:24px; flex-wrap:wrap; }
  .route-strip .leg { flex:1; min-width:110px; text-align:center; position:relative; padding:0 6px; }
  .route-strip .leg:not(:last-child)::after { content:"→"; position:absolute; right:-6px; top:8px; color:rgba(255,255,255,0.4); font-size:18px; }
  .route-strip .dnum { font-size:11px; letter-spacing:1px; opacity:0.7; }
  .route-strip .dname { font-family:'Fraunces',serif; font-size:16px; font-weight:600; margin-top:3px; }

  .map-section { padding:30px 0 8px; }
  .map-section h3 { font-family:'Fraunces',serif; font-size:23px; color:var(--moss); margin-bottom:4px; }
  .map-section .map-sub { color:var(--sub); font-size:14px; margin-bottom:16px; }
  .map-controls { display:flex; gap:7px; flex-wrap:wrap; margin-bottom:14px; align-items:center; }
  .map-btn { border:1px solid var(--line); background:#fff; color:var(--moss); padding:7px 15px; border-radius:24px; font-family:'Noto Sans HK',sans-serif; font-size:13px; font-weight:700; cursor:pointer; transition:all .18s; white-space:nowrap; }
  .map-btn:hover { border-color:var(--sage); }
  .map-btn.active { background:var(--moss); color:#fff; border-color:var(--moss); }
  .map-btn.all { background:var(--mist); }
  .map-btn.all.active { background:var(--sage); color:#fff; border-color:var(--sage); }
  .map-toggle { margin-left:auto; display:flex; align-items:center; gap:7px; font-size:13px; color:var(--sub); cursor:pointer; user-select:none;}
  .map-toggle input { accent-color:var(--moss); width:16px; height:16px; cursor:pointer;}
  #map { height:440px; width:100%; border-radius:16px; border:1px solid var(--line); z-index:1; box-shadow:0 6px 24px rgba(47,79,62,0.08); }
  .leaflet-popup-content { font-family:'Noto Sans HK',sans-serif; margin:11px 13px; }
  .leaflet-popup-content .pop-d { font-size:10px; letter-spacing:1px; color:var(--sage); font-weight:700; text-transform:uppercase;}
  .leaflet-popup-content .pop-n { font-weight:700; font-size:14px; color:var(--ink); margin:2px 0; }
  .leaflet-popup-content .pop-x { font-size:12.5px; color:var(--sub); line-height:1.45; }
  .map-pin { background:var(--moss); color:#fff; border-radius:50% 50% 50% 0; width:30px; height:30px; transform:rotate(-45deg); display:flex; align-items:center; justify-content:center; border:2px solid #fff; box-shadow:0 2px 6px rgba(0,0,0,0.3); font-weight:800; font-size:13px; font-family:'Fraunces',serif; }
  .map-pin span { transform:rotate(45deg); }
  .map-pin.base { background:var(--amber); }
  .map-legend { display:flex; gap:18px; margin-top:12px; font-size:12.5px; color:var(--sub); flex-wrap:wrap;}
  .map-legend .lg { display:flex; align-items:center; gap:6px; }
  .map-legend .sw { width:14px; height:14px; border-radius:50%; }

  .tabs-sticky { position:sticky; top:0; z-index:30; background:rgba(247,249,246,0.94); backdrop-filter:blur(8px); border-bottom:1px solid var(--line); }
  .tabs { display:flex; gap:6px; padding:12px 0; overflow-x:auto; align-items:center; }
  .tabs .now { font-size:12px; font-weight:700; color:var(--sage); margin-right:4px; white-space:nowrap; }
  .tab { flex-shrink:0; border:1px solid var(--line); background:#fff; color:var(--moss); padding:9px 16px; border-radius:30px; font-family:'Noto Sans HK',sans-serif; font-size:13.5px; font-weight:700; cursor:pointer; transition:all 0.2s; white-space:nowrap; }
  .tab:hover { border-color:var(--sage); }
  .tab.active { background:var(--moss); color:#fff; border-color:var(--moss); }

  section.day { padding:38px 0 10px; display:none; animation:fade 0.4s ease; }
  section.day.active { display:block; }
  @keyframes fade { from { opacity:0; transform:translateY(8px);} to { opacity:1; transform:none; } }
  .day-header { display:flex; align-items:flex-start; gap:18px; margin-bottom:24px; }
  .day-badge { background:var(--moss); color:#fff; border-radius:16px; width:66px; height:66px; flex-shrink:0; display:flex; flex-direction:column; align-items:center; justify-content:center; }
  .day-badge .n { font-family:'Fraunces',serif; font-size:28px; font-weight:900; line-height:1; }
  .day-badge .l { font-size:9px; letter-spacing:2px; opacity:0.85; }
  .day-header h2 { font-family:'Fraunces',serif; font-size:25px; font-weight:900; color:var(--moss); line-height:1.15; }
  .day-header .meta { color:var(--sub); font-size:14px; margin-top:4px; }
  .pill { display:inline-block; font-size:11px; font-weight:700; padding:3px 11px; border-radius:20px; margin-left:6px; vertical-align:middle; letter-spacing:.3px;}
  .pill.easy { background:#e3f0e7; color:#3d6b52; } .pill.mod { background:#fdeede; color:#b5732a; } .pill.drive { background:#e5edf5; color:#41618a; }
  .timeline { position:relative; margin-left:8px; }
  .timeline::before { content:""; position:absolute; left:60px; top:8px; bottom:8px; width:2px; background:var(--line); }
  .ti { display:flex; gap:18px; padding:9px 0; position:relative; }
  .ti .t { width:52px; flex-shrink:0; text-align:right; font-weight:700; color:var(--moss-2); font-size:14px; padding-top:1px; font-variant-numeric:tabular-nums;}
  .ti .dot { position:absolute; left:57px; top:12px; width:9px; height:9px; border-radius:50%; background:var(--sage); border:2px solid var(--paper); z-index:2; }
  .ti .c { flex:1; padding-left:20px; }
  .ti .c .nm { font-weight:700; font-size:15px; }
  .ti .c .nt { color:var(--sub); font-size:13px; }
  .note-box { background:var(--amber-bg); border:1px solid #f0e2c4; border-radius:12px; padding:14px 18px; margin-top:20px; font-size:14px; color:#8a6d3b; }
  .note-box b { color:#6b5424; }

  .block { padding:30px 0; border-top:1px solid var(--line); }
  .block h3 { font-family:'Fraunces',serif; font-size:23px; color:var(--moss); margin-bottom:18px; }
  .tip-row { display:flex; gap:14px; margin-bottom:14px; align-items:flex-start; }
  .tip-row .ic { width:30px; height:30px; border-radius:9px; background:var(--sage); color:#fff; flex-shrink:0; display:flex; align-items:center;justify-content:center; font-weight:800; font-family:'Fraunces',serif;}
  .tip-row .x { font-size:14.5px; }
  .tip-row .x b { color:var(--moss); }
  .pack-grid { display:grid; grid-template-columns:repeat(auto-fill, minmax(200px,1fr)); gap:10px; }
  .pk { display:flex; align-items:center; gap:11px; background:#fff; border:1px solid var(--line); border-radius:11px; padding:11px 14px; cursor:pointer; transition:all .15s; user-select:none; font-size:14px; }
  .pk:hover { border-color:var(--sage); }
  .pk .box { width:21px; height:21px; border-radius:6px; border:2px solid var(--line); flex-shrink:0; display:flex;align-items:center;justify-content:center; transition:all .15s; font-size:13px; }
  .pk.done .box { background:var(--sage); border-color:var(--sage); }
  .pk.done .lbl { text-decoration:line-through; color:var(--sub); }
  .pack-progress { font-size:13px; color:var(--sub); margin-bottom:14px; }
  .actions { display:flex; gap:12px; flex-wrap:wrap; }
  .btn { display:inline-flex; align-items:center; gap:8px; text-decoration:none; font-weight:700; font-size:14px; padding:12px 22px; border-radius:30px; transition:all .2s; cursor:pointer; border:none; font-family:'Noto Sans HK',sans-serif; }
  .btn.primary { background:var(--moss); color:#fff; }
  .btn.primary:hover { background:var(--moss-2); }
  .btn.ghost { background:#fff; color:var(--moss); border:1px solid var(--line); }
  .btn.ghost:hover { border-color:var(--sage); }

  .stay-grid { display:grid; grid-template-columns:repeat(auto-fill, minmax(280px,1fr)); gap:14px; }
  .stay { background:#fff; border:1px solid var(--line); border-radius:14px; padding:16px 18px; transition:all .18s; }
  .stay:hover { border-color:var(--sage); box-shadow:0 4px 16px rgba(47,79,62,0.07); }
  .stay.featured { border:2px solid var(--sage); background:#f7faf8; }
  .stay .s-top { display:flex; justify-content:space-between; align-items:flex-start; gap:10px; margin-bottom:6px; }
  .stay .s-name { font-family:'Fraunces',serif; font-size:17px; font-weight:600; color:var(--moss); line-height:1.25; }
  .stay .s-rating { background:var(--moss); color:#fff; font-size:12px; font-weight:700; padding:3px 9px; border-radius:20px; white-space:nowrap; flex-shrink:0; }
  .stay .s-type { font-size:11px; font-weight:700; letter-spacing:.5px; text-transform:uppercase; color:var(--sage); margin-bottom:8px; }
  .stay .s-feat { font-size:13px; color:var(--ink); line-height:1.5; margin-bottom:10px; }
  .stay .s-meta { display:flex; flex-wrap:wrap; gap:6px; }
  .stay .s-tag { background:var(--mist); color:var(--moss-2); font-size:11.5px; padding:3px 9px; border-radius:6px; }
  .stay .s-badge { display:inline-block; background:var(--sage); color:#fff; font-size:11px; font-weight:700; padding:2px 10px; border-radius:20px; margin-bottom:8px; }

  footer { background:var(--moss); color:rgba(255,255,255,0.8); text-align:center; padding:30px 20px; margin-top:40px; font-size:13px; }
  footer .big { font-family:'Fraunces',serif; color:#fff; font-size:18px; margin-bottom:6px; }

  @media (max-width:560px){
    .timeline::before { left:52px; } .ti .dot { left:49px; } .ti .t { width:44px; font-size:13px;}
    .hero { padding:60px 0 36px; } #map { height:380px; } .map-toggle { margin-left:0; width:100%; margin-top:4px;}
    .lang-switch { top:16px; }
  }
</style>
</head>

    <div class="wrap">
      <div class="lang-switch">

     en:["M6 traffic windows.","Worst Fri 1–7pm (commute + leisure) and Sunday evening. Northbound on Saturdays peaks 10am–1pm. The M6 Toll (~£8) skips the Birmingham crunch."]},
    {zh:["山上天氣多變。","就算 7 月,山頂都可以又凍又大霧大風。防水外套 + 保暖層必備,鞋一定要 walking boots。出發前查 Met Office「Lake District Mountain Weather」專頁。"],
     en:["Mountain weather changes fast.","Even in July, summits can be cold, foggy and windy. Waterproof + warm layer essential; wear proper walking boots. Check the Met Office 'Lake District Mountain Weather' page before you go."]},
    {zh:["停車場早到。","Catbells(Hawes End)、Loughrigg(White Moss)、Old Man(Walna Scar)朝早好快滿,9 點前到最穩陣。山區小路窄,唔好盲跟 Sat-Nav。"],
     en:["Arrive early for parking.","Hawes End (Catbells), White Moss (Loughrigg) and Walna Scar (Old Man) fill up fast — aim to arrive before 9am. Lanes are narrow; don't blindly follow sat-nav."]},
  ];

  const STAYS = [
    { featured:true, rating:"4.8", name:"The Gables Guesthouse", badge:{zh:"★ 行程預設",en:"★ Itinerary default"}, type:{zh:"B&B · 鎮中心",en:"B&B · town centre"}, feat:{zh:"評分最高,鎮中心位置、有免費泊車,老闆 Rohan friendly,早餐好評。適合行山友。",en:"Top-rated, central, free parking, friendly host Rohan, great breakfast. Ideal for hikers."}, tags:[{zh:"免費泊車",en:"Free parking"},{zh:"含早餐",en:"Breakfast incl."},{zh:"+44 15394 33272",en:"+44 15394 33272"}] },
    { rating:"4.6", name:"Brantholme B&B", type:{zh:"B&B · 有熱水浴池",en:"B&B · hot tub"}, feat:{zh:"寧靜、有花園同 hot tub,房大、view 靚,主人 Frank & Jo 好客。離鎮中心 5 分鐘步行。",en:"Quiet, garden & hot tub, spacious rooms, lovely views, welcoming hosts Frank & Jo. 5-min walk to town."}, tags:[{zh:"免費泊車",en:"Free parking"},{zh:"Hot tub",en:"Hot tub"},{zh:"+44 15394 33974",en:"+44 15394 33974"}] },
    { rating:"4.6", name:"Ambleside Townhouse", type:{zh:"B&B / 小酒店 · 鎮中心",en:"B&B / small hotel · central"}, feat:{zh:"性價比高、職員親切,早餐豐富。Lake Rd 位置方便。多人住過、評價穩定(近 300 評)。",en:"Great value, friendly staff, generous breakfast. Handy Lake Rd location, consistently reviewed (~300 reviews)."}, tags:[{zh:"抵住",en:"Good value"},{zh:"含早餐",en:"Breakfast incl."},{zh:"+44 15394 33240",en:"+44 15394 33240"}] },
    { rating:"4.4", name:"The Waterhead Inn", type:{zh:"湖邊 Inn / 酒店",en:"Lakeside inn / hotel"}, feat:{zh:"就喺 Windermere 湖邊,好多房望湖景,樓下有 pub 同餐廳,出門就係遊船碼頭。離鎮中心約 20 分鐘步行。",en:"Right on Windermere, many lake-view rooms, pub & restaurant downstairs, cruise jetty across the road. ~20-min walk to town."}, tags:[{zh:"湖景",en:"Lake view"},{zh:"餐廳 / Pub",en:"Restaurant / pub"},{zh:"+44 15394 32566",en:"+44 15394 32566"}] },
    { rating:"4.4", name:"Skelwith Bridge Hotel", type:{zh:"鄉郊酒店 · 有特色",en:"Country hotel · characterful"}, feat:{zh:"喺 Ambleside 西面約 10 分鐘車程,環境清幽、有古樸風味,dog-friendly,行 Loughrigg / Langdale 更就腳。",en:"~10-min drive west of Ambleside, peaceful and full of character, dog-friendly, handy for Loughrigg / Langdale."}, tags:[{zh:"寧靜",en:"Peaceful"},{zh:"近行山起點",en:"Near trailheads"},{zh:"+44 15394 32115",en:"+44 15394 32115"}] },
    { rating:"4.5", name:"YHA Ambleside", type:{zh:"青年旅舍 · 最抵",en:"Hostel · cheapest"}, feat:{zh:"預算之選,湖邊位置、view 一流,有平價餐廳同酒吧。可訂私人房(雙人 / 家庭房)。設施較簡樸但乾淨。",en:"Budget pick, lakeside with great views, affordable cafe & bar. Private rooms available (double / family). Basic but clean."}, tags:[{zh:"最平",en:"Cheapest"},{zh:"湖景",en:"Lake view"},{zh:"私人房可訂",en:"Private rooms"}] },
  ];

  let currentPlan = "A", currentDay = "all", showRoute = true, lang = "zh";

  function renderStatic(){
    const t = UI[lang];
    document.getElementById('heroTitle').textContent = t.title;
    document.getElementById('heroLead').textContent = t.lead;
    document.getElementById('groupLabel1').textContent = t.g1;
    document.getElementById('groupLabel2').textContent = t.g2;
    document.getElementById('mapTitle').textContent = t.mapTitle;
    document.getElementById('mapSub').textContent = t.mapSub;
    document.getElementById('tipsTitle').textContent = t.tipsTitle;
    document.getElementById('packTitle').textContent = t.packTitle;
    document.getElementById('linksTitle').textContent = t.linksTitle;
    document.getElementById('stayTitle').textContent = t.stayTitle;
    document.getElementById('stayIntro').textContent = t.stayIntro;
    document.getElementById('stayFoot').textContent = t.stayFoot;
    document.getElementById('footBig').textContent = t.footBig;
    document.getElementById('footSmall').textContent = t.footSmall;
    document.documentElement.lang = (lang === 'zh' ? 'zh-HK' : 'en');

    document.getElementById('mapLegend').innerHTML =
      '<div class="lg"><span class="sw" style="background:#b5732a"></span> '+t.legBase+'</div>'+
      '<div class="lg"><span class="sw" style="background:#2f4f3e"></span> '+t.legSpot+'</div>'+
      '<div class="lg"><span class="sw" style="background:#5a8f6b;border-radius:2px;width:18px;height:4px"></span> '+t.legRoute+'</div>';

    [1,2].forEach(g => {
      document.getElementById('planGroup'+g).innerHTML = PLAN_CARDS.filter(c=>c.group===g).map(c =>
        '<button class="plan-card'+(c.key===currentPlan?' active':'')+'" data-plan="'+c.key+'">'+
        '<div class="pc-tag">'+c.tag[lang]+'</div><div class="pc-name">'+c.name[lang]+'</div><div class="pc-desc">'+c.desc[lang]+'</div></button>').join('');
    });

    document.getElementById('tipsList').innerHTML = TIPS.map((tip,i) =>
      '<div class="tip-row"><div class="ic">'+(i+1)+'</div><div class="x"><b>'+tip[lang][0]+'</b> '+tip[lang][1]+'</div></div>').join('');

    renderPack();

    document.getElementById('actions').innerHTML =
      '<a class="btn primary" href="https://www.google.com/maps/dir/Ambleside/Catbells/Old+Man+of+Coniston/Loughrigg+Fell" target="_blank">'+t.btnMap+'</a>'+
      '<a class="btn ghost" href="https://www.metoffice.gov.uk/weather/specialist-forecasts/mountain/lake-district" target="_blank">'+t.btnWx+'</a>'+
      '<a class="btn ghost" href="http://www.thegables-ambleside.co.uk/" target="_blank">'+t.btnStay+'</a>'+
      '<button class="btn ghost" onclick="window.print()">'+t.btnPrint+'</button>';

    document.getElementById('stayGrid').innerHTML = STAYS.map(s => {
      const badge = s.featured ? '<span class="s-badge">'+s.badge[lang]+'</span>' : '';
      const tags = s.tags.map(tg => '<span class="s-tag">'+tg[lang]+'</span>').join('');
      return '<div class="stay'+(s.featured?' featured':'')+'">'+badge+'<div class="s-top"><div class="s-name">'+s.name+'</div><div class="s-rating">★ '+s.rating+'</div></div><div class="s-type">'+s.type[lang]+'</div><div class="s-feat">'+s.feat[lang]+'</div><div class="s-meta">'+tags+'</div></div>';
    }).join('');
  }

  function renderPack(){
    const pack = document.getElementById('pack');
    const doneSet = new Set([...document.querySelectorAll('.pk.done')].map(e=>e.dataset.idx));
    pack.innerHTML = '';
    PACK.forEach((label,idx) => {
      const isDone = doneSet.has(String(idx));
      const el = document.createElement('div');
      el.className = 'pk'+(isDone?' done':''); el.dataset.idx = idx;
      el.innerHTML = '<div class="box" style="color:'+(isDone?'#fff':'transparent')+'">✓</div><div class="lbl">'+label[lang]+'</div>';
      el.addEventListener('click', () => {
        el.classList.toggle('done');
        el.querySelector('.box').style.color = el.classList.contains('done') ? '#fff' : 'transparent';
        updateProg();
      });
      pack.appendChild(el);
    });
    updateProg();
  }
  function updateProg(){
    const done = document.querySelectorAll('.pk.done').length;
    document.getElementById('progress').textContent = UI[lang].packProg(done, PACK.length);
  }

  function renderPlan(planKey){
    currentPlan = planKey;
    const plan = PLANS[planKey];
    document.querySelectorAll('.plan-card').forEach(c => c.classList.toggle('active', c.dataset.plan === planKey));

    document.getElementById('routeStrip').innerHTML = plan.strip.map(s =>
      '<div class="leg"><div class="dnum">'+s[lang][0]+'</div><div class="dname">'+s[lang][1]+'</div></div>').join('');

    let mc = '<button class="map-btn all active" data-day="all">'+UI[lang].all+'</button>';
    plan.days.forEach(d => mc += '<button class="map-btn" data-day="'+d.d+'">'+plan.strip[d.d-1][lang][0]+'</button>');
    mc += '<label class="map-toggle"><input type="checkbox" id="routeToggle" checked> '+UI[lang].showRoute+'</label>';
    document.getElementById('mapControls').innerHTML = mc;

    const nowLabel = '<span class="now">'+plan.label[lang]+':</span>';
    document.getElementById('tabs').innerHTML = nowLabel + plan.days.map((d,i) =>
      '<button class="tab'+(i===0?' active':'')+'" data-day="'+d.d+'">'+plan.strip[d.d-1][lang][0]+' · '+plan.strip[d.d-1][lang][1]+'</button>').join('');

    document.getElementById('dayPanels').innerHTML = plan.days.map((d,i) => {
      const pills = d.pills.map(p => '<span class="pill '+p[0]+'">'+p[1][lang]+'</span>').join('');
      const tl = d.tl.map(r => '<div class="ti"><div class="t">'+r[0]+'</div><div class="dot"></div><div class="c"><div class="nm">'+r[1][lang]+'</div>'+(r[2][lang]?'<div class="nt">'+r[2][lang]+'</div>':'')+'</div></div>').join('');
      const note = d.note ? '<div class="note-box">'+d.note[lang]+'</div>' : '';
      const badgeLabel = plan.strip[d.d-1][lang][0];
      return '<section class="day'+(i===0?' active':'')+'" data-day="'+d.d+'"><div class="day-header"><div class="day-badge"><span class="n">'+d.d+'</span><span class="l">'+badgeLabel+'</span></div><div><h2>'+d.title[lang]+' '+pills+'</h2><div class="meta">'+d.meta[lang]+'</div></div></div><div class="timeline">'+tl+'</div>'+note+'</section>';
    }).join('');

    bindTabs();
    if (typeof L !== 'undefined') renderMap('all');
  }

  function bindTabs(){
    const tabs = document.querySelectorAll('.tab');
    const days = document.querySelectorAll('section.day');
    tabs.forEach(tab => tab.addEventListener('click', () => {
      const d = tab.dataset.day;
      tabs.forEach(t => t.classList.toggle('active', t.dataset.day === d));
      days.forEach(s => s.classList.toggle('active', s.dataset.day === d));
      if (typeof L !== 'undefined') renderMap(d);
      window.scrollTo({ top: document.querySelector('.tabs-sticky').offsetTop, behavior: 'smooth' });
    }));
    const mcEl = document.getElementById('mapControls');
    mcEl.querySelectorAll('.map-btn').forEach(b => b.addEventListener('click', () => {
      if (typeof L !== 'undefined') renderMap(b.dataset.day);
    }));
    const rt = document.getElementById('routeToggle');
    if (rt) rt.addEventListener('change', e => { showRoute = e.target.checked; renderMap(currentDay); });
  }

  document.querySelectorAll('#planGroup1, #planGroup2').forEach(g =>
    g.addEventListener('click', e => {
      const card = e.target.closest('.plan-card');
      if (card) { renderPlan(card.dataset.plan); window.scrollTo({top:0, behavior:'smooth'}); }
    }));

  document.querySelector('.lang-switch').addEventListener('click', e => {
    const btn = e.target.closest('.lang-btn');
    if (!btn) return;
    lang = btn.dataset.lang;
    document.querySelectorAll('.lang-btn').forEach(b => b.classList.toggle('active', b.dataset.lang === lang));
    renderStatic();
    renderPlan(currentPlan);
  });

  let map, markerLayer, routeLayer;
  if (typeof L === 'undefined') {
    document.getElementById('map').innerHTML =
      '<div style="height:100%;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:24px;color:#7d8c83;background:#eef3ef;border-radius:16px;">'+
      '<div style="font-size:38px;margin-bottom:10px;">🗺️</div>'+
      '<div style="font-weight:700;color:#2f4f3e;margin-bottom:6px;">Map unavailable / 地圖暫時載入唔到</div>'+
      '<a href="https://www.google.com/maps/dir/Ambleside/Catbells/Old+Man+of+Coniston/Loughrigg+Fell" target="_blank" style="background:#2f4f3e;color:#fff;text-decoration:none;font-weight:700;font-size:14px;padding:11px 22px;border-radius:30px;margin-top:12px;">Open in Google Maps →</a>'+
      '</div>';
    renderStatic(); renderPlan('A');
  } else {
    map = L.map('map', { scrollWheelZoom:false }).setView([54.45,-3.03], 10);
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', { maxZoom:18, subdomains:['a','b','c'], attribution:'© OpenStreetMap' }).addTo(map);
    map.on('click', () => map.scrollWheelZoom.enable());
    markerLayer = L.layerGroup().addTo(map);
    routeLayer = L.layerGroup().addTo(map);

    window.renderMap = function(day){
      markerLayer.clearLayers(); routeLayer.clearLayers(); currentDay = day;
      const plan = PLANS[currentPlan];
      function pinIcon(s){ const lbl = s.base ? (lang==='en'?'S':'住') : s.label; return L.divIcon({ className:'', html:'<div class="map-pin '+(s.base?'base':'')+'"><span>'+lbl+'</span></div>', iconSize:[30,30], iconAnchor:[15,30], popupAnchor:[0,-30] }); }
      function addStop(s){
        const m = L.marker([s.lat,s.lng], { icon: pinIcon(s) });
        const dd = s.base ? 'BASE' : 'STOP '+s.label;
        m.bindPopup('<div class="pop-d">'+dd+'</div><div class="pop-n">'+s.name[lang]+'</div><div class="pop-x">'+s.note[lang]+'</div>');
        m.addTo(markerLayer); return [s.lat,s.lng];
      }
      if (day === 'all'){
        const seen={}, pts=[];
        plan.days.forEach(d => d.stops.forEach(s => { const k=s.lat+','+s.lng; if(seen[k])return; seen[k]=1; pts.push(addStop(s)); }));
        if(pts.length) map.fitBounds(pts, { padding:[40,40] });
      } else {
        const d = plan.days.find(x => String(x.d) === String(day));
        const pts = d.stops.map(addStop);
        if (showRoute && pts.length > 1) L.polyline(pts, { color:'#5a8f6b', weight:4, opacity:0.8, dashArray:'2,8', lineCap:'round' }).addTo(routeLayer);
        map.flyToBounds(pts, { padding:[50,50], duration:0.6 });
      }
      document.querySelectorAll('.map-btn').forEach(b => b.classList.toggle('active', b.dataset.day === String(day)));
    };

    renderStatic(); renderPlan('A');
    setTimeout(() => { map.invalidateSize(); renderMap('all'); }, 200);
  }
</script>
</body>
</html>
